<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUAPI Chat</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3f4f6;
            --panel: rgba(255, 255, 255, 0.94);
            --panel-soft: #f8fafc;
            --line: #d7deea;
            --text: #172033;
            --muted: #667085;
            --accent: #0f766e;
            --accent-strong: #115e59;
            --danger: #dc2626;
            --danger-soft: #fee2e2;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "PingFang SC", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.16), transparent 28%),
                linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
        }

        button, input, select, textarea { font: inherit; }
        button { cursor: pointer; }
        .hidden { display: none !important; }

        .shell {
            display: grid;
            grid-template-columns: 340px 1fr;
            min-height: 100vh;
        }

        .sidebar,
        .panel,
        .auth-card,
        .admin-card {
            background: var(--panel);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(215, 222, 234, 0.92);
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        }

        .sidebar {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .panel {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            min-width: 0;
            min-height: 100vh;
        }

        .key-tools {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--panel-soft);
        }

        .sidebar-secondary-btn {
            width: 100%;
            background: white;
            border: 1px solid var(--line);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 12px;
            text-align: left;
        }

        .sidebar-secondary-btn:hover:not(:disabled) {
            background: #f8fafc;
        }

        .sidebar-secondary-btn:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }

        .key-meta {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.5;
            word-break: break-word;
        }

        .custom-select {
            position: relative;
        }

        .custom-select-button {
            width: 100%;
            padding: 13px 46px 13px 15px;
            background: var(--select-bg);
            border: 1px solid var(--select-border);
            color: white;
            border-radius: 13px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 10px 24px var(--select-shadow);
            transition: transform 0.18s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            text-align: left;
            cursor: pointer;
            position: relative;
        }

        .custom-select-button::after {
            content: "";
            position: absolute;
            right: 20px;
            top: 50%;
            width: 11px;
            height: 11px;
            border-right: 2px solid rgba(255, 255, 255, 0.92);
            border-bottom: 2px solid rgba(255, 255, 255, 0.92);
            transform: translateY(-70%) rotate(45deg);
            transition: transform 0.2s ease;
        }

        .custom-select.open .custom-select-button::after {
            transform: translateY(-25%) rotate(225deg);
        }

        .custom-select-button:hover {
            border-color: rgba(196, 181, 253, 0.82);
            transform: translateY(-1px);
        }

        .custom-select-button:focus {
            outline: none;
            border-color: rgba(196, 181, 253, 0.96);
            box-shadow: 0 0 0 5px var(--select-ring), inset 0 1px 0 rgba(255,255,255,0.05), 0 14px 28px rgba(0,0,0,0.28);
        }

        .custom-select-menu {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            right: 0;
            background: #2b2d38;
            border: 1px solid rgba(167, 139, 250, 0.35);
            border-radius: 14px;
            padding: 8px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.38);
            display: none;
            z-index: 20;
        }

        .custom-select.open .custom-select-menu {
            display: block;
        }

        .custom-select-option {
            width: 100%;
            border: none;
            background: transparent;
            color: #f5f7fb;
            text-align: left;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 0.98rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.18s ease, color 0.18s ease;
        }

        .custom-select-option:hover,
        .custom-select-option.active {
            background: linear-gradient(90deg, rgba(139, 92, 246, 0.22), rgba(59, 130, 246, 0.14));
            color: white;
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .session-item {
            background: transparent;
            border: none;
            color: #d1d5db;
            text-align: left;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .session-item:hover {
            background-color: var(--sidebar-hover);
        }

        .session-item.active {
            background-color: var(--sidebar-hover);
            color: white;
        }

        .session-title {
            font-weight: 500;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-meta {
            font-size: 0.75rem;
            color: #9ca3af;
        }

        .brand h1,
        .session-title {
            margin: 0;
            font-weight: 700;
        }

        .brand h1 {
            font-size: 28px;
        }

        .helper,
        .meta-text,
        .status-text {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .nav-group {
            display: grid;
            gap: 8px;
        }

        .nav-btn {
            width: 100%;
            border: 1px solid var(--line);
            background: #f8fafc;
            color: var(--text);
            border-radius: 14px;
            padding: 12px 14px;
            text-align: left;
            font-weight: 600;
        }

        .nav-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .toolbar,
        .header-row,
        .session-row,
        .composer-row,
        .auth-actions,
        .tab-row,
        .message-top {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .toolbar,
        .header-row,
        .composer-row,
        .message-top {
            justify-content: space-between;
        }

        .primary-btn,
        .secondary-btn,
        .danger-btn,
        .ghost-btn,
        .message-btn {
            border-radius: 12px;
            border: 1px solid transparent;
            padding: 10px 14px;
            transition: 0.18s ease;
            background: white;
        }

        .primary-btn {
            background: var(--accent);
            color: white;
        }

        .primary-btn:hover { background: var(--accent-strong); }

        .secondary-btn,
        .ghost-btn,
        .message-btn {
            border-color: var(--line);
            color: var(--text);
        }

        .danger-btn,
        .message-btn.danger {
            border-color: #fecaca;
            color: var(--danger);
        }

        .danger-btn:hover,
        .message-btn.danger:hover {
            background: var(--danger-soft);
        }

        input,
        select,
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 11px 12px;
            background: white;
            color: var(--text);
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        .session-list,
        .messages,
        .admin-list {
            overflow-y: auto;
            min-height: 0;
        }

        .session-list,
        .admin-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .session-card {
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: var(--panel-soft);
            text-align: left;
        }

        .session-card.active {
            border-color: #14b8a6;
            background: white;
        }

        .messages {
            padding: 6px 2px;
        }

        .main-view {
            display: grid;
            gap: 18px;
            min-height: 0;
            flex: 1;
        }

        .chat-view {
            grid-template-rows: auto 1fr auto;
        }

        .db-view {
            grid-template-rows: auto 1fr;
        }

        .page-card {
            border: 1px solid var(--line);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.9);
            padding: 18px;
        }

        .db-page-shell {
            display: grid;
            grid-template-columns: 220px minmax(0, 1fr);
            gap: 16px;
            min-height: 0;
            align-items: start;
        }

        .db-side-panel {
            display: grid;
            gap: 10px;
            align-content: start;
        }

        .db-main-panel {
            display: grid;
            gap: 12px;
            grid-template-rows: auto minmax(260px, 1fr);
            align-content: start;
            min-width: 0;
            min-height: 0;
        }

        .db-header-card {
            padding: 14px 16px;
        }

        .db-header-card .meta-text {
            margin-top: 2px;
        }

        .message {
            max-width: 860px;
            padding: 16px;
            border-radius: 18px;
            margin-bottom: 14px;
            line-height: 1.6;
        }

        .message.user {
            margin-left: auto;
            background: #dff7f3;
        }

        .message.assistant {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .message-role {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .message-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .auth-overlay,
        .admin-overlay,
        .db-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.42);
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .auth-card {
            width: min(540px, 100%);
            border-radius: 24px;
            padding: 24px;
        }

        .admin-card {
            width: min(900px, 100%);
            max-height: 80vh;
            overflow: auto;
            border-radius: 24px;
            padding: 24px;
        }

        .db-modal-card {
            width: min(880px, calc(100vw - 40px));
            max-height: 84vh;
            overflow: auto;
            border-radius: 24px;
            padding: 22px;
            background: var(--panel);
            border: 1px solid rgba(215, 222, 234, 0.92);
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(12px);
            display: grid;
            gap: 16px;
        }

        .db-modal-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .db-modal-field {
            display: grid;
            gap: 6px;
        }

        .db-modal-field label {
            font-size: 12px;
            color: var(--muted);
        }

        .db-modal-field input,
        .db-modal-field textarea {
            background: white;
        }

        .db-modal-field input[readonly],
        .db-modal-field textarea[readonly] {
            background: #f8fafc;
            color: var(--muted);
            cursor: not-allowed;
        }

        .db-modal-field textarea {
            min-height: 88px;
        }

        .db-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tab-row {
            margin-bottom: 16px;
        }

        .tab-btn {
            flex: 1;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: #f8fafc;
            padding: 11px 12px;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .form-grid {
            display: grid;
            gap: 12px;
        }

        .inline-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
        }

        .admin-user-card {
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px;
            background: #f8fafc;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
        }

        .admin-user-meta {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .admin-tabs {
            display: flex;
            gap: 10px;
            margin: 16px 0;
        }

        .admin-tab-btn {
            border-radius: 12px;
            border: 1px solid var(--line);
            background: #f8fafc;
            padding: 10px 14px;
            cursor: pointer;
        }

        .admin-tab-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .admin-panel {
            display: grid;
            gap: 14px;
        }

        .admin-db-toolbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            padding: 10px 12px;
            align-self: start;
        }

        .admin-db-filters {
            display: grid;
            grid-template-columns: minmax(260px, 440px) auto auto;
            gap: 10px;
            align-items: center;
        }

        .admin-db-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .compact-card {
            padding: 12px 14px;
        }

        .admin-db-toolbar-meta {
            grid-column: 1 / -1;
            min-height: 18px;
            font-size: 12px;
            color: var(--muted);
        }

        .admin-db-layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 16px;
            min-height: 420px;
        }

        .admin-db-tables {
            border: 1px solid var(--line);
            border-radius: 16px;
            background: #f8fafc;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: auto;
            max-height: 68vh;
        }

        .admin-db-table-btn {
            border: 1px solid var(--line);
            background: white;
            border-radius: 10px;
            padding: 9px 10px;
            text-align: left;
            cursor: pointer;
        }

        .admin-db-table-btn.active {
            border-color: #14b8a6;
            background: #ecfeff;
        }

        .admin-db-content {
            display: grid;
            gap: 14px;
            min-width: 0;
        }

        .admin-db-rows {
            display: grid;
            gap: 10px;
            min-height: 320px;
        }

        .admin-db-table-wrap {
            border: 1px solid var(--line);
            border-radius: 16px;
            background: white;
            overflow: auto;
            min-height: 320px;
        }

        .admin-db-table-grid {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .admin-db-table-grid th,
        .admin-db-table-grid td {
            border-bottom: 1px solid #e5e7eb;
            padding: 10px 12px;
            text-align: left;
            vertical-align: top;
            white-space: nowrap;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .admin-db-table-grid thead th {
            position: sticky;
            top: 0;
            background: #f8fafc;
            z-index: 1;
        }

        .admin-db-table-grid tr.active {
            background: #ecfeff;
        }

        .admin-db-table-grid td.actions {
            white-space: nowrap;
        }

        .table-action-btn {
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            color: white;
            font-size: 12px;
            margin-right: 6px;
        }

        .table-action-btn.view { background: #3b82f6; }
        .table-action-btn.edit { background: #f59e0b; }
        .table-action-btn.delete { background: #ef4444; }

        .empty-state {
            min-height: 220px;
            display: grid;
            place-items: center;
            color: var(--muted);
            font-size: 13px;
            border: 1px dashed var(--line);
            border-radius: 16px;
            background: rgba(248, 250, 252, 0.7);
        }

        .message-file-list,
        .composer-file-list {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            margin-bottom: 10px;
        }

        .message-file-card,
        .composer-file-card {
            display: grid;
            gap: 8px;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: white;
        }

        .file-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: fit-content;
            min-width: 52px;
            padding: 4px 8px;
            border-radius: 999px;
            background: rgba(15, 118, 110, 0.12);
            color: var(--accent-strong);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .file-name {
            font-weight: 600;
            word-break: break-word;
        }

        .file-meta {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
            word-break: break-word;
        }

        @media (max-width: 980px) {
            .shell { grid-template-columns: 1fr; }
            .panel { margin: 0; border-radius: 0; min-height: 70vh; }
            .sidebar { border-radius: 0; }
            .admin-user-card { grid-template-columns: 1fr; }
            .admin-db-layout { grid-template-columns: 1fr; }
            .db-page-shell { grid-template-columns: 1fr; }
            .admin-db-toolbar { grid-template-columns: 1fr; }
            .admin-db-filters { grid-template-columns: 1fr; }
            .admin-db-actions { justify-content: flex-start; }
            .db-modal-grid { grid-template-columns: 1fr; }
        }
    </style>

</head>
<body>
    <div class="shell">
        <aside class="sidebar">
            <div class="brand">
                <h1>UUAPI Chat</h1>
                <div class="helper">登录后即可使用独立聊天记录，每个用户只看到自己的会话。</div>
            </div>

            <div class="toolbar">
                <button id="new-chat-btn" class="primary-btn" type="button">新对话</button>
                <select id="model-select">
                    {% for model in models %}
                    <option value="{{ model }}" {% if model == default_model %}selected{% endif %}>{{ model }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <div id="auth-user" class="session-title">未登录</div>
                <div id="auth-meta" class="meta-text">请先登录后再开始聊天。</div>
            </div>

            <div class="nav-group">
                <button id="chat-view-btn" class="nav-btn active" type="button">聊天中心</button>
                <button id="db-view-btn" class="nav-btn hidden" type="button">数据库管理</button>
            </div>
            <div class="toolbar">
                <button id="rename-session-btn" class="secondary-btn" type="button" disabled>重命名</button>
                <button id="delete-session-btn" class="danger-btn" type="button" disabled>删除会话</button>
            </div>
            <div id="session-list" class="session-list"></div>
        </aside>
        <main class="panel workspace-panel">
            <section id="chat-view" class="main-view chat-view">
                <header class="header-row workspace-header">
                    <div>
                        <div id="chat-title" class="session-title">新对话</div>
                        <div id="chat-subtitle" class="meta-text">登录后历史会话会保存在 SQLite 中。</div>
                    </div>
                    <div class="auth-actions">
                        <button id="import-keys-btn" class="secondary-btn hidden" type="button">导入</button>
                        <button id="admin-btn" class="secondary-btn hidden" type="button">用户管理</button>
                        <button id="show-auth-btn" class="secondary-btn hidden" type="button">登录 / 注册</button>
                        <button id="logout-btn" class="secondary-btn hidden" type="button">退出登录</button>
                    </div>
                </header>

                <section id="messages" class="messages"></section>

                <form id="chat-form" class="composer">
                    <textarea id="message-input" placeholder="输入你的问题，按 Ctrl+Enter 发送"></textarea>
                    <input id="image-input" class="hidden" type="file" accept="image/jpeg,image/png,image/webp,image/gif,text/plain,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,.txt,.pdf,.docx" multiple>
                    <div id="composer-image-preview" class="composer-image-preview hidden">
                        <div id="composer-image-list" class="composer-image-list"></div>
                        <div class="composer-image-meta">
                            <div id="composer-image-name" class="helper"></div>
                            <button id="remove-image-btn" class="ghost-btn" type="button">移除附件</button>
                        </div>
                    </div>
                    <div class="composer-row">
                        <div class="composer-tools">
                            <button id="attach-image-btn" class="secondary-btn" type="button">上传附件</button>
                            <span id="status-text" class="status-text">正在检查登录状态...</span>
                        </div>
                        <button id="send-btn" class="primary-btn" type="submit">发送</button>
                    </div>
                </form>
            </section>

            <section id="db-view" class="main-view db-view hidden">
                <header class="header-row page-card db-header-card">
                    <div>
                        <div class="session-title">数据库管理</div>
                        <div class="meta-text">SuperAdmin 可以像后台表格一样切换数据表、查看记录并直接编辑。</div>
                    </div>
                    <div class="auth-actions">
                        <button id="db-refresh-btn" class="secondary-btn" type="button">刷新表结构</button>
                        <button id="db-back-chat-btn" class="ghost-btn" type="button">返回聊天</button>
                    </div>
                </header>

                <div class="db-page-shell">
                    <aside class="db-side-panel page-card">
                        <div class="session-title">数据表</div>
                        <div id="admin-db-tables" class="admin-db-tables"></div>
                    </aside>

                    <section class="db-main-panel">
                        <div class="admin-db-toolbar page-card compact-card">
                            <div class="admin-db-filters">

                    <button id="send-reset-code-btn" class="secondary-btn" type="button">发验证码</button>

        <div class="admin-card">

                    <button id="refresh-admin-btn" class="secondary-btn" type="button">刷新</button>

        <div class="db-modal-card">
            <div class="header-row">
                <div>

                    <div id="db-modal-subtitle" class="helper">按字段填写后保存。</div>
                </div>
                <button id="close-db-modal-btn" class="ghost-btn" type="button">关闭</button>
            </div>

            <div id="db-modal-grid" class="db-modal-grid"></div>
            <div class="db-modal-actions">
                <button id="cancel-db-modal-btn" class="ghost-btn" type="button">取消</button>
                <button id="save-db-modal-btn" class="primary-btn" type="button">保存</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            auth: null,
            currentView: "chat",
            sessionId: null,
            sessions: [],
            messages: [],
            selectedImages: [],
            selectedFiles: [],
            selectedImage: null,
            sending: false,
            currentAssistantMessageId: null,
            importingKeys: false,
            keyCount: 0,
            adminTables: [],
            adminDbQuery: "",
            selectedAdminTable: "",
            selectedAdminTableInfo: null,
            selectedAdminRow: null,
            dbModalMode: "view",
            dbModalRow: null,
        };

        const sessionListEl = document.getElementById("session-list");
        const messagesEl = document.getElementById("messages");
        const chatTitleEl = document.getElementById("chat-title");
        const chatSubtitleEl = document.getElementById("chat-subtitle");
        const modelSelectEl = document.getElementById("model-select");
        const messageInputEl = document.getElementById("message-input");
        const imageInputEl = document.getElementById("image-input");
        const attachImageBtnEl = document.getElementById("attach-image-btn");
        const removeImageBtnEl = document.getElementById("remove-image-btn");
        const composerImagePreviewEl = document.getElementById("composer-image-preview");
        const composerImageListEl = document.getElementById("composer-image-list");
        const composerImageNameEl = document.getElementById("composer-image-name");
        const imageLightboxEl = document.getElementById("image-lightbox");
        const imageLightboxImgEl = document.getElementById("image-lightbox-img");
        const statusTextEl = document.getElementById("status-text");
        const sendBtnEl = document.getElementById("send-btn");
        const renameSessionBtnEl = document.getElementById("rename-session-btn");
        const deleteSessionBtnEl = document.getElementById("delete-session-btn");
        const importKeysBtnEl = document.getElementById("import-keys-btn");
        const keyMetaEl = document.getElementById("key-meta");
        const keyToolsEl = document.getElementById("key-tools");
        const authOverlayEl = document.getElementById("auth-overlay");
        const adminOverlayEl = document.getElementById("admin-overlay");
        const chatViewEl = document.getElementById("chat-view");
        const dbViewEl = document.getElementById("db-view");
        const chatViewBtnEl = document.getElementById("chat-view-btn");
        const dbViewBtnEl = document.getElementById("db-view-btn");
        const dbRefreshBtnEl = document.getElementById("db-refresh-btn");
        const dbBackChatBtnEl = document.getElementById("db-back-chat-btn");
        const dbSearchInputEl = document.getElementById("db-search-input");
        const dbSearchBtnEl = document.getElementById("db-search-btn");
        const dbClearSearchBtnEl = document.getElementById("db-clear-search-btn");
        const dbModalOverlayEl = document.getElementById("db-modal-overlay");
        const dbModalTitleEl = document.getElementById("db-modal-title");
        const dbModalSubtitleEl = document.getElementById("db-modal-subtitle");
        const dbModalStatusEl = document.getElementById("db-modal-status");
        const dbModalGridEl = document.getElementById("db-modal-grid");
        const closeDbModalBtnEl = document.getElementById("close-db-modal-btn");
        const cancelDbModalBtnEl = document.getElementById("cancel-db-modal-btn");
        const saveDbModalBtnEl = document.getElementById("save-db-modal-btn");
        const authUserEl = document.getElementById("auth-user");
        const authMetaEl = document.getElementById("auth-meta");
        const showAuthBtnEl = document.getElementById("show-auth-btn");
        const logoutBtnEl = document.getElementById("logout-btn");
        const adminBtnEl = document.getElementById("admin-btn");
        const authStatusEl = document.getElementById("auth-status");
        const adminStatusEl = document.getElementById("admin-status");
        const adminStatusOverlayEl = document.getElementById("admin-status-overlay");
        const adminUserListEl = document.getElementById("admin-user-list");
        const adminUsersPanelEl = document.getElementById("admin-users-panel");
        const adminDbTablesEl = document.getElementById("admin-db-tables");
        const adminDbRowsEl = document.getElementById("admin-db-rows");
        const SUPPORTED_IMAGE_TYPES = new Set(["image/jpeg", "image/png", "image/webp", "image/gif"]);
        const SUPPORTED_DOCUMENT_TYPES = new Set([
            "text/plain",
            "application/pdf",
            "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
        ]);
        const DOCUMENT_EXTENSION_TYPES = {
            ".txt": "text/plain",
            ".pdf": "application/pdf",
            ".docx": "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
        };
        const MAX_IMAGE_BYTES = 5 * 1024 * 1024;
        const MAX_DOCUMENT_BYTES = 10 * 1024 * 1024;

        function uid() {
            return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        }

        function setStatus(text) {
            statusTextEl.textContent = text;
        }

        function renderKeyMeta(sourceUrl = null) {
            if (!importKeysBtnEl) {
                return;
            }
            if (keyMetaEl) {
                const sourceText = sourceUrl || "GitHub";
                keyMetaEl.textContent = `Key ${state.keyCount} · ${sourceText}`;
            }
            importKeysBtnEl.disabled = !state.auth?.is_admin || state.sending || state.importingKeys;
            importKeysBtnEl.textContent = state.importingKeys ? "导入中..." : "导入";
        }

        function setAuthStatus(text, isError = false) {
            authStatusEl.textContent = text || "";
            authStatusEl.style.color = isError ? "#dc2626" : "#667085";
        }

        function setAdminStatus(text, isError = false) {
            adminStatusEl.textContent = text || "";
            adminStatusEl.style.color = isError ? "#dc2626" : "#667085";
            if (adminStatusOverlayEl) {
                adminStatusOverlayEl.textContent = text || "";
                adminStatusOverlayEl.style.color = isError ? "#dc2626" : "#667085";
            }
        }

        async function switchMainView(view) {
            const isDbView = view === "db";
            if (isDbView && !state.auth?.is_admin) {
                setStatus("只有 SuperAdmin 可以进入数据库管理");
                return;
            }
            state.currentView = isDbView ? "db" : "chat";
            chatViewEl.classList.toggle("hidden", isDbView);
            dbViewEl.classList.toggle("hidden", !isDbView);
            chatViewBtnEl.classList.toggle("active", !isDbView);
            dbViewBtnEl.classList.toggle("active", isDbView);
            if (isDbView && !state.adminTables.length) {
                await refreshAdminTables();
            }
        }

        function escapeHtml(text) {
            return String(text || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;");
        }

        function getDisplayContent(message) {
            const raw = String(message?.content || "");
            if (message?.role !== "assistant") {
                return raw;
            }
            return raw.replaceAll("#", "").replaceAll("*", "");
        }

        function formatMessageContent(message) {
            return escapeHtml(getDisplayContent(message)).replaceAll("\n", "<br>");
        }

        function getMessageImages(message) {
            if (Array.isArray(message?.images) && message.images.length) {
                return message.images.filter((image) => image?.media_type && image?.data);
            }
            if (message?.image?.media_type && message?.image?.data) {
                return [message.image];
            }
            return [];
        }

        function getMessageFiles(message) {
            if (!Array.isArray(message?.files)) {
                return [];
            }
            return message.files.filter((file) => file?.name && file?.media_type);
        }

        function getFileTypeLabel(file) {
            const mediaType = String(file?.media_type || "").toLowerCase();
            if (mediaType === "application/pdf") return "PDF";
            if (mediaType === "text/plain") return "TXT";
            if (mediaType === "application/vnd.openxmlformats-officedocument.wordprocessingml.document") return "DOCX";
            return "FILE";
        }

        function buildMessageFilesHtml(message) {
            const files = getMessageFiles(message);
            if (!files.length) {
                return "";
            }
            return `
                <div class="message-file-list">
                    ${files.map((file) => `
                        <div class="message-file-card">
                            <span class="file-badge">${getFileTypeLabel(file)}</span>
                            <div class="file-name">${escapeHtml(file.name || "附件")}</div>
                            <div class="file-meta">已解析后发送给 AI${file.parsed_char_count ? ` · ${file.parsed_char_count} chars` : ""}</div>
                        </div>
                    `).join("")}
                </div>
            `;
        }

        function cloneFiles(files) {
            return getMessageFiles({ files }).map((file) => ({ ...file }));
        }

        function fileExtension(name) {
            const normalized = String(name || "").trim().toLowerCase();
            const dotIndex = normalized.lastIndexOf(".");
            return dotIndex >= 0 ? normalized.slice(dotIndex) : "";
        }

        function normalizeDocumentType(file) {
            const explicitType = String(file?.type || "").trim().toLowerCase();
            if (SUPPORTED_DOCUMENT_TYPES.has(explicitType)) {
                return explicitType;
            }
            if (!explicitType || explicitType === "application/octet-stream") {
                return DOCUMENT_EXTENSION_TYPES[fileExtension(file?.name)] || "";
            }
            return explicitType;
        }

        function normalizeFilesForRequest(files) {
            return (files || []).map((file) => ({
                name: file.name || null,
                media_type: file.media_type,
                data: file.data,
            }));
        }

        function buildMessageImagesHtml(message) {
            const images = getMessageImages(message);
            if (!images.length) {
                return "";
            }
            return `
                <div class="message-image-grid">
                    ${images.map((image, index) => {
                        const previewSrc = buildImageDataUrl(image);
                        const alt = escapeHtml(image.name || `uploaded-image-${index + 1}`);
                        return `<div class="message-image"><img class="zoomable-image" data-preview-src="${previewSrc}" src="${previewSrc}" alt="${alt}"></div>`;
                    }).join("")}
                </div>
            `;
        }

        function buildMessageHtml(message) {
            const images = getMessageImages(message);
            return `
                <div class="message ${message.role}" data-message-id="${message.id}">
                    <div class="message-top">
                        <div class="message-role">${message.role === "user" ? "用户" : "AI"}</div>
                        <div class="message-actions">
                            ${message.role === "user" && !message.image ? `<button class="message-btn" type="button" data-edit-message="${message.id}">编辑后重发</button>` : ""}
                            <button class="message-btn danger" type="button" data-delete-message="${message.id}">从此删除</button>
                        </div>
                    </div>
                    ${message.image ? `<div class="message-image"><img class="zoomable-image" data-preview-src="${buildImageDataUrl(message.image)}" src="${buildImageDataUrl(message.image)}" alt="${escapeHtml(message.image.name || "上传图片")}"></div>` : ""}
                    <div class="message-content ${message.content ? "" : "hidden"}" data-message-content="${message.id}">${message.content ? formatMessageContent(message) : ""}</div>
                </div>
            `;
        }

        function bindMessageEvents(scope = messagesEl) {
            scope.querySelectorAll("[data-delete-message]").forEach((button) => {
                if (button.dataset.boundDelete === "1") return;
                button.dataset.boundDelete = "1";
                button.addEventListener("click", async () => deleteMessageFrom(Number(button.dataset.deleteMessage)));
            });
            scope.querySelectorAll("[data-edit-message]").forEach((button) => {
                if (button.dataset.boundEdit === "1") return;
                button.dataset.boundEdit = "1";
                button.addEventListener("click", async () => {
                    const target = state.messages.find((item) => item.id === Number(button.dataset.editMessage));
                    if (target) {
                        await editAndResendMessage(target);
                    }
                });
            });
            scope.querySelectorAll(".zoomable-image").forEach((image) => {
                if (image.dataset.boundZoom === "1") return;
                image.dataset.boundZoom = "1";
                image.addEventListener("click", () => openImageLightbox(image.dataset.previewSrc || image.getAttribute("src") || ""));
            });
        }

        function openImageLightbox(src) {
            if (!src || !imageLightboxEl || !imageLightboxImgEl) return;
            imageLightboxImgEl.src = src;
            imageLightboxEl.classList.remove("hidden");
        }

        function closeImageLightbox() {
            if (!imageLightboxEl || !imageLightboxImgEl) return;
            imageLightboxEl.classList.add("hidden");
            imageLightboxImgEl.removeAttribute("src");
        }

        function isMessagesNearBottom() {
            return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 72;
        }

        function buildImageDataUrl(image) {
            if (!image?.media_type || !image?.data) {
                return "";
            }
            return `data:${image.media_type};base64,${image.data}`;
        }

        function renderComposerImage() {
            const image = state.selectedImage;
            composerImagePreviewEl.classList.toggle("hidden", !image);
            removeImageBtnEl.disabled = !image || state.sending || !state.auth?.authenticated;
            if (!image) {
                composerImagePreviewImgEl.removeAttribute("src");
                delete composerImagePreviewImgEl.dataset.previewSrc;
                composerImageNameEl.textContent = "";
                return;
            }
            composerImagePreviewImgEl.src = image.preview_url || buildImageDataUrl(image);
            composerImagePreviewImgEl.dataset.previewSrc = image.preview_url || buildImageDataUrl(image);
            composerImageNameEl.textContent = image.name || "已选择图片";
        }

        function clearSelectedImage() {
            state.selectedImage = null;
            imageInputEl.value = "";
            renderComposerImage();
        }

        function normalizeImageForRequest(image) {
            if (!image) {
                return null;
            }
            return {
                name: image.name || null,
                media_type: image.media_type,
                data: image.data,
            };
        }

        async function handleImageFile(file) {
            if (!file) {
                return;
            }
            if (!SUPPORTED_IMAGE_TYPES.has(file.type)) {
                throw new Error("仅支持 JPG、PNG、WEBP、GIF 图片");
            }
            if (file.size > MAX_IMAGE_BYTES) {
                throw new Error("图片不能超过 5 MB");
            }

            const dataUrl = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(new Error("读取图片失败"));
                reader.readAsDataURL(file);
            });

            const dataUrlText = String(dataUrl || "");
            const commaIndex = dataUrlText.indexOf(",");
            if (commaIndex < 0) {
                throw new Error("图片编码失败");
            }

            state.selectedImage = {
                name: file.name,
                media_type: file.type,
                data: dataUrlText.slice(commaIndex + 1),
                preview_url: dataUrlText,
            };
            renderComposerImage();
        }

        function applyAuth(auth) {
            state.auth = auth;
            const loggedIn = Boolean(auth?.authenticated);
            authUserEl.textContent = loggedIn ? auth.user.username : "未登录";
            authMetaEl.textContent = loggedIn
                ? `${auth.user.email} · ${auth.user.role}`
                : "请先登录后再开始聊天。";
            importKeysBtnEl.classList.toggle("hidden", !auth?.is_admin);
            logoutBtnEl.classList.toggle("hidden", !loggedIn);
            showAuthBtnEl.classList.toggle("hidden", loggedIn);
            adminBtnEl.classList.toggle("hidden", !auth?.is_admin);
            dbViewBtnEl.classList.toggle("hidden", !auth?.is_admin);
            if (keyToolsEl) {
                keyToolsEl.classList.toggle("hidden", !auth?.is_admin);
            }
            messageInputEl.disabled = !loggedIn || state.sending;
            imageInputEl.disabled = !loggedIn || state.sending;
            attachImageBtnEl.disabled = !loggedIn || state.sending;
            removeImageBtnEl.disabled = !loggedIn || state.sending || (!state.selectedImages.length && !state.selectedFiles.length);
            sendBtnEl.disabled = !loggedIn || state.sending;
            modelSelectEl.disabled = !loggedIn || state.sending;
            renameSessionBtnEl.disabled = !loggedIn || !state.sessionId || state.sending;
            deleteSessionBtnEl.disabled = !loggedIn || !state.sessionId || state.sending;
            renderKeyMeta();

            if (!auth?.is_admin && state.currentView === "db") {
                void switchMainView("chat");
            }

            if (!loggedIn) {
                state.currentView = "chat";
                state.sessionId = null;
                state.sessions = [];
                state.messages = [];
                state.keyCount = 0;
                clearSelectedImage();
                renderSessions();
                renderMessages();
                chatTitleEl.textContent = "新对话";
                chatSubtitleEl.textContent = "登录后历史会话会保存在 SQLite 中。";
                setStatus("请先登录");
                authOverlayEl.classList.remove("hidden");
                adminOverlayEl.classList.add("hidden");
                chatViewEl.classList.remove("hidden");
                dbViewEl.classList.add("hidden");
                chatViewBtnEl.classList.add("active");
                dbViewBtnEl.classList.remove("active");
            }
        }

        function setSending(isSending) {
            state.sending = isSending;
            applyAuth(state.auth);
            setStatus(isSending ? "正在思考..." : (state.auth?.authenticated ? "准备就绪" : "请先登录"));
        }

        function cloneImages(images) {
            return getMessageImages({ images }).map((image) => ({ ...image }));
        }

        function renderComposerImage() {
            const images = Array.isArray(state.selectedImages) ? state.selectedImages : [];
            const files = Array.isArray(state.selectedFiles) ? state.selectedFiles : [];
            state.selectedImage = images[0] || null;
            const hasAttachments = images.length || files.length;
            composerImagePreviewEl.classList.toggle("hidden", !hasAttachments);
            removeImageBtnEl.disabled = !hasAttachments || state.sending || !state.auth?.authenticated;
            if (!hasAttachments) {
                composerImageListEl.innerHTML = "";
                composerImageNameEl.textContent = "";
                return;
            }

            const imageHtml = images.map((image, index) => {
                const previewSrc = image.preview_url || buildImageDataUrl(image);
                const imageName = escapeHtml(image.name || `image-${index + 1}`);
                return `
                    <div class="composer-image-card">
                        <img class="composer-image-preview-img zoomable-image" data-preview-src="${previewSrc}" src="${previewSrc}" alt="${imageName}">
                        <div class="composer-image-card-footer">
                            <span class="helper">${imageName}</span>
                            <button class="ghost-btn composer-image-remove" type="button" data-remove-selected-image="${index}">Remove</button>
                        </div>
                    </div>
                `;
            }).join("");
            const fileHtml = files.map((file, index) => `
                <div class="composer-file-card">
                    <span class="file-badge">${getFileTypeLabel(file)}</span>
                    <div class="file-name">${escapeHtml(file.name || `attachment-${index + 1}`)}</div>
                    <div class="file-meta">会先解析文本，再把解析结果发给 AI</div>
                    <button class="ghost-btn composer-image-remove" type="button" data-remove-selected-file="${index}">Remove</button>
                </div>
            `).join("");
            composerImageListEl.innerHTML = `${imageHtml}${fileHtml}`;
            const summary = [];
            if (images.length) summary.push(`${images.length} image${images.length > 1 ? "s" : ""}`);
            if (files.length) summary.push(`${files.length} file${files.length > 1 ? "s" : ""}`);
            composerImageNameEl.textContent = `${summary.join(" + ")} selected`;
            composerImageListEl.querySelectorAll("[data-remove-selected-image]").forEach((button) => {
                button.addEventListener("click", () => {
                    const index = Number(button.dataset.removeSelectedImage);
                    if (Number.isNaN(index)) {
                        return;
                    }
                    state.selectedImages = state.selectedImages.filter((_, imageIndex) => imageIndex !== index);
                    if (!state.selectedImages.length) {
                        imageInputEl.value = "";
                    }
                    renderComposerImage();
                });
            });
            composerImageListEl.querySelectorAll("[data-remove-selected-file]").forEach((button) => {
                button.addEventListener("click", () => {
                    const index = Number(button.dataset.removeSelectedFile);
                    if (Number.isNaN(index)) {
                        return;
                    }
                    state.selectedFiles = state.selectedFiles.filter((_, fileIndex) => fileIndex !== index);

        function normalizeImagesForRequest(images) {
            return (images || []).map((image) => ({

            }));
        }

        async function handleImageFile(file) {
            if (!file) {
                return null;
            }
            if (!SUPPORTED_IMAGE_TYPES.has(file.type)) {
                throw new Error("浠呮敮鎸?JPG銆丳NG銆乄EBP銆丟IF 鍥剧墖");
            }
            if (file.size > MAX_IMAGE_BYTES) {
                throw new Error("鍥剧墖涓嶈兘瓒呰繃 5 MB");
            }

            const dataUrl = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(new Error("璇诲彇鍥剧墖澶辫触"));
                reader.readAsDataURL(file);
            });

            const dataUrlText = String(dataUrl || "");
            const commaIndex = dataUrlText.indexOf(",");
            if (commaIndex < 0) {
                throw new Error("鍥剧墖缂栫爜澶辫触");
            }

            const image = {
                name: file.name,
                media_type: file.type,
                data: dataUrlText.slice(commaIndex + 1),
                preview_url: dataUrlText,
            };
            state.selectedImages = [...(state.selectedImages || []), image];
            state.selectedImage = state.selectedImages[0] || image;
            renderComposerImage();
            return image;
        }

        async function handleImageFiles(files) {
            const addedImages = [];
            for (const file of Array.from(files || [])) {
                const image = await handleImageFile(file);
                if (image) {
                    addedImages.push(image);
                }
            }
            return addedImages;
        }

        async function handleDocumentFile(file) {
            if (!file) {
                return null;
            }
            const mediaType = normalizeDocumentType(file);
            if (!SUPPORTED_DOCUMENT_TYPES.has(mediaType)) {
                throw new Error("仅支持 txt、docx、pdf 文件");
            }
            if (file.size > MAX_DOCUMENT_BYTES) {
                throw new Error("文件不能超过 10 MB");
            }

            const arrayBuffer = await file.arrayBuffer();
            const bytes = new Uint8Array(arrayBuffer);
            let binary = "";
            const chunkSize = 0x8000;
            for (let index = 0; index < bytes.length; index += chunkSize) {
                binary += String.fromCharCode(...bytes.subarray(index, index + chunkSize));
            }

            const documentFile = {
                name: file.name,
                media_type: mediaType,
                data: btoa(binary),
                size: file.size,
            };
            state.selectedFiles = [...(state.selectedFiles || []), documentFile];
            renderComposerImage();
            return documentFile;
        }

        async function handleAttachmentFiles(files) {
            const addedImages = [];
            const addedFiles = [];
            for (const file of Array.from(files || [])) {
                if (SUPPORTED_IMAGE_TYPES.has(file.type)) {
                    const image = await handleImageFile(file);
                    if (image) {
                        addedImages.push(image);
                    }
                    continue;
                }
                const mediaType = normalizeDocumentType(file);
                if (SUPPORTED_DOCUMENT_TYPES.has(mediaType)) {
                    const documentFile = await handleDocumentFile(file);
                    if (documentFile) {
                        addedFiles.push(documentFile);
                    }
                    continue;
                }
                throw new Error(`不支持的文件类型：${file.name || "附件"}`);
            }
            return { images: addedImages, files: addedFiles };
        }

        async function editAndResendMessage(message) {
            if (getMessageImages(message).length) {
                setStatus("鍥剧墖娑堟伅鏆備笉鏀寔缂栬緫鍚庨噸鍙?");
                return;
            }
            const edited = window.prompt("淇敼鍚庝細浠庤繖閲岄噸鏂扮敓鎴愬悗缁璇濄€?", message.content);
            if (edited === null) return;
            const trimmed = edited.trim();
            if (!trimmed) {
                setStatus("娑堟伅涓嶈兘涓虹┖");
                return;
            }
            const targetIndex = state.messages.findIndex((item) => item.id === message.id);
            if (targetIndex < 0) {
                setStatus("鏈壘鍒拌缂栬緫鐨勬秷鎭?");
                return;
            }
            const previousMessages = state.messages.map((item) => {
                const images = cloneImages(getMessageImages(item));
                return {
                    ...item,
                    images,
                    image: images[0] || null,
                };
            });
            const optimisticAssistantId = uid();
            state.messages = [
                ...state.messages.slice(0, targetIndex),
                { ...message, content: trimmed, images: [], image: null },
                { id: optimisticAssistantId, role: "assistant", content: "", images: [], image: null },
            ];
            state.currentAssistantMessageId = optimisticAssistantId;
            renderMessages();
            setSending(true);
            try {
                const response = await fetch("/api/chat/stream", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        session_id: state.sessionId,
                        message: trimmed,
                        model: modelSelectEl.value,
                        replace_from_message_id: message.id,
                    }),
                });

                if (!response.ok) {
                    const data = await response.json().catch(() => ({}));
                    throw new Error(data.detail || "閲嶅彂澶辫触");
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";
                let assistantText = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const chunks = buffer.split("\n\n");
                    buffer = chunks.pop() || "";

                    for (const chunk of chunks) {
                        const lines = chunk.split("\n");
                        let eventName = "message";
                        let dataText = "";

                        for (const line of lines) {
                            if (line.startsWith("event:")) eventName = line.slice(6).trim();
                            if (line.startsWith("data:")) dataText += line.slice(5).trim();
                        }

                        if (!dataText) continue;
                        const payload = JSON.parse(dataText);

                        if (eventName === "start" && payload.session) {
                            state.sessionId = payload.session.id;
                            chatTitleEl.textContent = payload.session.title;
                            chatSubtitleEl.textContent = payload.session.id;
                        }
                        if (eventName === "delta") {
                            assistantText += payload.text || "";
                            updateLocalMessage(state.currentAssistantMessageId, assistantText);
                        }
                        if (eventName === "done") {
                            assistantText = payload.reply || assistantText;
                            updateLocalMessage(state.currentAssistantMessageId, assistantText);
                            if (payload.session) {
                                chatTitleEl.textContent = payload.session.title;
                                chatSubtitleEl.textContent = payload.session.id;
                            }
                            setStatus("宸查噸鏂扮敓鎴愬悗缁璇?");
                            refreshSessions().catch(() => {});
                            loadSession(state.sessionId).catch(() => {});
                        }
                        if (eventName === "error") {
                            throw new Error(payload.detail || "閲嶅彂澶辫触");
                        }
                    }
                }
            } catch (error) {
                state.messages = previousMessages;
                renderMessages();
                setStatus(error.message || "閲嶅彂澶辫触");
            } finally {
                state.currentAssistantMessageId = null;
                setSending(false);
            }
        }

                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const chunks = buffer.split("\n\n");
                    buffer = chunks.pop() || "";

                    for (const chunk of chunks) {

                        let eventName = "message";

                        for (const line of lines) {
                            if (line.startsWith("event:")) eventName = line.slice(6).trim();

                return `${column.name}${suffix}=${value}`;
            }).join("\n");
        }

        function parseRowPromptText(text) {
            const values = {};
            for (const line of String(text || "").split("\n")) {
                const trimmed = line.trim();
                if (!trimmed) {
                    continue;
                }
                const separatorIndex = trimmed.indexOf("=");
                if (separatorIndex < 0) {
                    continue;
                }
                const rawKey = trimmed.slice(0, separatorIndex).trim();
                const key = rawKey.replace(/\s*\[PK\]$/, "").trim();
                const rawValue = trimmed.slice(separatorIndex + 1);
                values[key] = rawValue === "" ? null : rawValue;
            }
            return values;
        }

        async function saveDbModal() {
            const tableInfo = state.selectedAdminTableInfo;
            if (!tableInfo) {
                return;
            }
            try {
                const values = collectDbModalValues();
                if (state.dbModalMode === "create") {
                    await fetchJson(`/api/admin/db/tables/${encodeURIComponent(state.selectedAdminTable)}/rows`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ values }),
                    });
                    await loadAdminTable(state.selectedAdminTable);
                    closeDbModal();
                    setAdminStatus("新增成功");
                    return;
                }

                const currentRow = state.dbModalRow;
                if (!currentRow) {
                    setDbModalStatus("缺少待编辑记录", true);
                    return;
                }
                const pk = getPrimaryKeyPayload(tableInfo, currentRow);
                const updates = {};
                for (const [key, value] of Object.entries(values)) {
                    if (!(tableInfo.primary_keys || []).includes(key) && JSON.stringify(value) !== JSON.stringify(currentRow[key] ?? null)) {
                        updates[key] = value;
                    }
                }
                if (!Object.keys(updates).length) {
                    setDbModalStatus("没有检测到变更");
                    return;
                }
                await fetchJson(`/api/admin/db/tables/${encodeURIComponent(state.selectedAdminTable)}/rows`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ pk, updates }),

                closeDbModal();
                setAdminStatus("更新成功");

                setDbModalStatus(error.message || "保存失败", true);
            }

async function editAndResendMessage(message) {
            if (message.image) {
                setStatus("图片消息暂不支持编辑后重发");
                return;
            }
            const edited = window.prompt("修改后会从这里重新生成后续对话。", message.content);
            if (edited === null) return;
            const trimmed = edited.trim();
            if (!trimmed) {
                setStatus("消息不能为空");
                return;
            }
            const targetIndex = state.messages.findIndex((item) => item.id === message.id);
            if (targetIndex < 0) {
                setStatus("未找到要编辑的消息");
                return;
            }
            const previousMessages = state.messages.map((item) => ({
                ...item,
                image: item.image ? { ...item.image } : item.image,
            }));
            const optimisticAssistantId = uid();
            state.messages = [
                ...state.messages.slice(0, targetIndex),
                { ...message, content: trimmed },
                { id: optimisticAssistantId, role: "assistant", content: "", image: null },
            ];
            state.currentAssistantMessageId = optimisticAssistantId;
            renderMessages();
            setSending(true);
            try {
                const response = await fetch("/api/chat/stream", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        session_id: state.sessionId,
                        message: trimmed,
                        model: modelSelectEl.value,
                        replace_from_message_id: message.id,
                    }),
                });

                if (!response.ok) {
                    const data = await response.json().catch(() => ({}));
                    throw new Error(data.detail || "重发失败");
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";
                let assistantText = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const chunks = buffer.split("\n\n");
                    buffer = chunks.pop() || "";

                    for (const chunk of chunks) {
                        const lines = chunk.split("\n");
                        let eventName = "message";
                        let dataText = "";

                        for (const line of lines) {
                            if (line.startsWith("event:")) eventName = line.slice(6).trim();
                            if (line.startsWith("data:")) dataText += line.slice(5).trim();
                        }

                        if (!dataText) continue;
                        const payload = JSON.parse(dataText);

                        if (eventName === "start" && payload.session) {
                            state.sessionId = payload.session.id;
                            chatTitleEl.textContent = payload.session.title;
                            chatSubtitleEl.textContent = payload.session.id;
                        }
                        if (eventName === "delta") {
                            assistantText += payload.text || "";
                            updateLocalMessage(state.currentAssistantMessageId, assistantText);
                        }
                        if (eventName === "done") {
                            assistantText = payload.reply || assistantText;
                            updateLocalMessage(state.currentAssistantMessageId, assistantText);
                            if (payload.session) {
                                chatTitleEl.textContent = payload.session.title;
                                chatSubtitleEl.textContent = payload.session.id;
                            }
                            setStatus("已重新生成后续对话");
                            refreshSessions().catch(() => {});
                            loadSession(state.sessionId).catch(() => {});
                        }
                        if (eventName === "error") {
                            throw new Error(payload.detail || "重发失败");
                        }
                    }
                }
            } catch (error) {
                state.messages = previousMessages;
                renderMessages();
                setStatus(error.message || "重发失败");
            } finally {
                state.currentAssistantMessageId = null;
                setSending(false);
            }
        }

        function buildMessageHtml(message) {
            const images = getMessageImages(message);

                    <div class="message-top">
                        <div class="message-role">${message.role === "user" ? "用户" : "AI"}</div>
                        <div class="message-actions">
                            ${message.role === "user" && !images.length && !files.length ? `<button class="message-btn" type="button" data-edit-message="${message.id}">编辑后重发</button>` : ""}
                            <button class="message-btn danger" type="button" data-delete-message="${message.id}">从此删除</button>
                        </div>
                    </div>
                    ${buildMessageImagesHtml({ images })}
                    ${buildMessageFilesHtml({ files })}
                    <div class="message-content ${message.content ? "" : "hidden"}" data-message-content="${message.id}">${message.content ? formatMessageContent(message) : ""}</div>
                </div>
            `;
        }

        async function handleImageFile(file) {
            if (!file) {
                return null;
            }
            if (!SUPPORTED_IMAGE_TYPES.has(file.type)) {
                throw new Error("仅支持 JPG、PNG、WEBP、GIF 图片");
            }
            if (file.size > MAX_IMAGE_BYTES) {
                throw new Error("图片不能超过 5 MB");
            }

            const dataUrl = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(new Error("读取图片失败"));
                reader.readAsDataURL(file);
            });

            const dataUrlText = String(dataUrl || "");
            const commaIndex = dataUrlText.indexOf(",");
            if (commaIndex < 0) {
                throw new Error("图片编码失败");
            }

            const image = {
                name: file.name,
                media_type: file.type,
                data: dataUrlText.slice(commaIndex + 1),
                preview_url: dataUrlText,
            };
            state.selectedImages = [...(state.selectedImages || []), image];
            state.selectedImage = state.selectedImages[0] || image;
            renderComposerImage();
            return image;
        }

        async function editAndResendMessage(message) {
            if (getMessageImages(message).length || getMessageFiles(message).length) {
                setStatus("带附件的消息暂不支持编辑后重发");
                return;
            }
            const edited = window.prompt("修改后会从这里重新生成后续对话。", message.content);
            if (edited === null) return;

            const trimmed = edited.trim();
            if (!trimmed) {
                setStatus("消息不能为空");
                return;
            }

            const targetIndex = state.messages.findIndex((item) => item.id === message.id);
            if (targetIndex < 0) {
                setStatus("未找到要编辑的消息");
                return;
            }

            const previousMessages = state.messages.map((item) => {
                const images = cloneImages(getMessageImages(item));
                const files = cloneFiles(getMessageFiles(item));
                return {
                    ...item,
                    images,
                    image: images[0] || null,
                    files,
                };
            });

            const optimisticAssistantId = uid();
            state.messages = [
                ...state.messages.slice(0, targetIndex),
                { ...message, content: trimmed, images: [], image: null, files: [] },
                { id: optimisticAssistantId, role: "assistant", content: "", images: [], image: null, files: [] },
            ];
            state.currentAssistantMessageId = optimisticAssistantId;
            renderMessages();
            setSending(true);

            try {
                const response = await fetch("/api/chat/stream", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        session_id: state.sessionId,
                        message: trimmed,
                        model: modelSelectEl.value,
                        replace_from_message_id: message.id,
                    }),
                });

                if (!response.ok) {
                    const data = await response.json().catch(() => ({}));
                    throw new Error(data.detail || "重发失败");
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";
                let assistantText = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const chunks = buffer.split("\n\n");
                    buffer = chunks.pop() || "";

                    for (const chunk of chunks) {
                        const lines = chunk.split("\n");
                        let eventName = "message";
                        let dataText = "";

                        for (const line of lines) {
                            if (line.startsWith("event:")) eventName = line.slice(6).trim();
                            if (line.startsWith("data:")) dataText += line.slice(5).trim();
                        }

                        if (!dataText) continue;
                        const payload = JSON.parse(dataText);

                        if (eventName === "start" && payload.session) {
                            state.sessionId = payload.session.id;
                            chatTitleEl.textContent = payload.session.title;
                            chatSubtitleEl.textContent = payload.session.id;
                        }
                        if (eventName === "delta") {
                            assistantText += payload.text || "";
                            updateLocalMessage(state.currentAssistantMessageId, assistantText);
                        }
                        if (eventName === "done") {
                            assistantText = payload.reply || assistantText;
                            updateLocalMessage(state.currentAssistantMessageId, assistantText);
                            if (payload.session) {
                                chatTitleEl.textContent = payload.session.title;
                                chatSubtitleEl.textContent = payload.session.id;
                            }
                            setStatus("已重新生成后续对话");
                            refreshSessions().catch(() => {});
                            loadSession(state.sessionId).catch(() => {});
                        }
                        if (eventName === "error") {
                            throw new Error(payload.detail || "重发失败");
                        }
                    }
                }
            } catch (error) {
                state.messages = previousMessages;
                renderMessages();
                setStatus(error.message || "重发失败");
            } finally {
                state.currentAssistantMessageId = null;
                setSending(false);
            }
        }

        async function sendMessage() {
            const message = messageInputEl.value.trim();
            const selectedImages = cloneImages(state.selectedImages || []);
            const selectedFiles = cloneFiles(state.selectedFiles || []);
            const images = normalizeImagesForRequest(selectedImages);
            const files = normalizeFilesForRequest(selectedFiles);
            if ((!message && !images.length && !files.length) || state.sending) return;
            if (!state.sessionId) {
                await createSession();
            }
            if (!state.sessionId) return;

            const pendingMessage = message;
            const pendingImages = images;
            const pendingFiles = files;
            messageInputEl.value = "";
            clearSelectedImage();
            appendLocalMessage("user", pendingMessage, pendingImages, pendingFiles);
            state.currentAssistantMessageId = appendLocalMessage("assistant", "");
            setSending(true);

            try {
                const response = await fetch("/api/chat/stream", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        session_id: state.sessionId,
                        message: pendingMessage,
                        images: pendingImages,
                        files: pendingFiles,
                        model: modelSelectEl.value,
                    }),
                });

                if (!response.ok) {
                    const data = await response.json().catch(() => ({}));
                    throw new Error(data.detail || "发送失败");
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";
                let assistantText = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const chunks = buffer.split("\n\n");
                    buffer = chunks.pop() || "";

                    for (const chunk of chunks) {
                        const lines = chunk.split("\n");
                        let eventName = "message";
                        let dataText = "";

                        for (const line of lines) {
                            if (line.startsWith("event:")) eventName = line.slice(6).trim();
                            if (line.startsWith("data:")) dataText += line.slice(5).trim();
                        }

                        if (!dataText) continue;
                        const payload = JSON.parse(dataText);

                        if (eventName === "start" && payload.session) {
                            state.sessionId = payload.session.id;
                            chatTitleEl.textContent = payload.session.title;
                            chatSubtitleEl.textContent = payload.session.id;
                        }
                        if (eventName === "delta") {
                            assistantText += payload.text || "";
                            updateLocalMessage(state.currentAssistantMessageId, assistantText);
                        }
                        if (eventName === "done") {
                            assistantText = payload.reply || assistantText;
                            updateLocalMessage(state.currentAssistantMessageId, assistantText);
                            if (payload.session) {
                                chatTitleEl.textContent = payload.session.title;
                                chatSubtitleEl.textContent = payload.session.id;
                            }
                            await refreshSessions();
                        }
                        if (eventName === "error") {
                            throw new Error(payload.detail || "发送失败");
                        }
                    }
                }
            } catch (error) {
                state.messages = state.messages.slice(0, -2);
                state.selectedImages = selectedImages;
                state.selectedFiles = selectedFiles;
                state.selectedImage = selectedImages[0] || null;
                renderComposerImage();
                renderMessages();
                setStatus(error.message || "发送失败");
            } finally {
                state.currentAssistantMessageId = null;
                setSending(false);
                messageInputEl.focus();
            }
        }

        async function init() {
            renderKeyMeta();
            renderSessions();
            renderMessages();
            renderComposerImage();
            const auth = await refreshAuth();
            if (auth?.authenticated) {
                if (auth.is_admin) {
                    await refreshKeyStatus();
                }
                await refreshSessions();
                if (state.sessions.length) {
                    await loadSession(state.sessions[0].id, true);
                } else {
                    setStatus("准备就绪");
                }
            }
        }

        init();
    </script>
