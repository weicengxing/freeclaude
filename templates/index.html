<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUAPI Chat</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3f4f6;
            --panel: rgba(255, 255, 255, 0.94);
            --panel-soft: #f8fafc;
            --line: #d7deea;
            --text: #172033;
            --muted: #667085;
            --accent: #0f766e;
            --accent-strong: #115e59;
            --danger: #dc2626;
            --danger-soft: #fee2e2;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "PingFang SC", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.16), transparent 28%),
                linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
        }

        button, input, select, textarea { font: inherit; }
        button { cursor: pointer; }
        .hidden { display: none !important; }

        .shell {
            display: grid;
            grid-template-columns: 340px 1fr;
            min-height: 100vh;
        }

        .sidebar,
        .panel,
        .auth-card,
        .admin-card {
            background: var(--panel);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(215, 222, 234, 0.92);
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        }

        .sidebar {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .key-tools {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--panel-soft);
        }

        .sidebar-secondary-btn {
            width: 100%;
            background: white;
            border: 1px solid var(--line);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 12px;
            text-align: left;
        }

        .sidebar-secondary-btn:hover:not(:disabled) {
            background: #f8fafc;
        }

        .sidebar-secondary-btn:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }

        .key-meta {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.5;
            word-break: break-word;
        }

        .custom-select {
            position: relative;
        }

        .custom-select-button {
            width: 100%;
            padding: 13px 46px 13px 15px;
            background: var(--select-bg);
            border: 1px solid var(--select-border);
            color: white;
            border-radius: 13px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 10px 24px var(--select-shadow);
            transition: transform 0.18s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            text-align: left;
            cursor: pointer;
            position: relative;
        }

        .custom-select-button::after {
            content: "";
            position: absolute;
            right: 20px;
            top: 50%;
            width: 11px;
            height: 11px;
            border-right: 2px solid rgba(255, 255, 255, 0.92);
            border-bottom: 2px solid rgba(255, 255, 255, 0.92);
            transform: translateY(-70%) rotate(45deg);
            transition: transform 0.2s ease;
        }

        .custom-select.open .custom-select-button::after {
            transform: translateY(-25%) rotate(225deg);
        }

        .custom-select-button:hover {
            border-color: rgba(196, 181, 253, 0.82);
            transform: translateY(-1px);
        }

        .custom-select-button:focus {
            outline: none;
            border-color: rgba(196, 181, 253, 0.96);
            box-shadow: 0 0 0 5px var(--select-ring), inset 0 1px 0 rgba(255,255,255,0.05), 0 14px 28px rgba(0,0,0,0.28);
        }

        .custom-select-menu {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            right: 0;
            background: #2b2d38;
            border: 1px solid rgba(167, 139, 250, 0.35);
            border-radius: 14px;
            padding: 8px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.38);
            display: none;
            z-index: 20;
        }

        .custom-select.open .custom-select-menu {
            display: block;
        }

        .custom-select-option {
            width: 100%;
            border: none;
            background: transparent;
            color: #f5f7fb;
            text-align: left;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 0.98rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.18s ease, color 0.18s ease;
        }

        .custom-select-option:hover,
        .custom-select-option.active {
            background: linear-gradient(90deg, rgba(139, 92, 246, 0.22), rgba(59, 130, 246, 0.14));
            color: white;
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .session-item {
            background: transparent;
            border: none;
            color: #d1d5db;
            text-align: left;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .session-item:hover {
            background-color: var(--sidebar-hover);
        }

        .session-item.active {
            background-color: var(--sidebar-hover);
            color: white;
        }

        .session-title {
            font-weight: 500;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-meta {
            font-size: 0.75rem;
            color: #9ca3af;
        }

        .brand h1,
        .session-title {
            margin: 0;
            font-weight: 700;
        }

        .brand h1 {
            font-size: 28px;
        }

        .helper,
        .meta-text,
        .status-text {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .toolbar,
        .header-row,
        .session-row,
        .composer-row,
        .auth-actions,
        .tab-row,
        .message-top {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .toolbar,
        .header-row,
        .composer-row,
        .message-top {
            justify-content: space-between;
        }

        .primary-btn,
        .secondary-btn,
        .danger-btn,
        .ghost-btn,
        .message-btn {
            border-radius: 12px;
            border: 1px solid transparent;
            padding: 10px 14px;
            transition: 0.18s ease;
            background: white;
        }

        .primary-btn {
            background: var(--accent);
            color: white;
        }

        .primary-btn:hover { background: var(--accent-strong); }

        .secondary-btn,
        .ghost-btn,
        .message-btn {
            border-color: var(--line);
            color: var(--text);
        }

        .danger-btn,
        .message-btn.danger {
            border-color: #fecaca;
            color: var(--danger);
        }

        .danger-btn:hover,
        .message-btn.danger:hover {
            background: var(--danger-soft);
        }

        input,
        select,
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 11px 12px;
            background: white;
            color: var(--text);
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        .session-list,
        .messages,
        .admin-list {
            overflow-y: auto;
            min-height: 0;
        }

        .session-list,
        .admin-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .session-card {
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: var(--panel-soft);
            text-align: left;
        }

        .session-card.active {
            border-color: #14b8a6;
            background: white;
        }

        .messages {
            padding: 6px 2px;
        }

        .message {
            max-width: 860px;
            padding: 16px;
            border-radius: 18px;
            margin-bottom: 14px;
            line-height: 1.6;
        }

        .message.user {
            margin-left: auto;
            background: #dff7f3;
        }

        .message.assistant {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .message-role {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .message-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .auth-overlay,
        .admin-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.42);
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .auth-card {
            width: min(540px, 100%);
            border-radius: 24px;
            padding: 24px;
        }

        .admin-card {
            width: min(900px, 100%);
            max-height: 80vh;
            overflow: auto;
            border-radius: 24px;
            padding: 24px;
        }

        .tab-row {
            margin-bottom: 16px;
        }

        .tab-btn {
            flex: 1;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: #f8fafc;
            padding: 11px 12px;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .form-grid {
            display: grid;
            gap: 12px;
        }

        .inline-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
        }

        .admin-user-card {
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px;
            background: #f8fafc;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
        }

        .admin-user-meta {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        @media (max-width: 980px) {
            .shell { grid-template-columns: 1fr; }
            .panel { margin: 0; border-radius: 0; min-height: 70vh; }
            .sidebar { border-radius: 0; }
            .admin-user-card { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <aside class="sidebar">
            <div class="brand">
                <h1>UUAPI Chat</h1>
                <div class="helper">登录后即可使用独立聊天记录，每个用户只看到自己的会话。</div>
            </div>

            <div class="toolbar">
                <button id="new-chat-btn" class="primary-btn" type="button">新对话</button>
                <select id="model-select">
                    {% for model in models %}
                    <option value="{{ model }}" {% if model == default_model %}selected{% endif %}>{{ model }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <div id="auth-user" class="session-title">未登录</div>
                <div id="auth-meta" class="meta-text">请先登录后再开始聊天。</div>
            </div>

            <div id="key-tools" class="key-tools hidden">
                <button id="import-keys-btn" class="sidebar-secondary-btn" type="button">从 GitHub 导入 Key</button>
                <div id="key-meta" class="key-meta">Key 数量：加载中...</div>
            </div>

            <div class="toolbar">
                <button id="rename-session-btn" class="secondary-btn" type="button" disabled>重命名</button>
                <button id="delete-session-btn" class="danger-btn" type="button" disabled>删除会话</button>
            </div>
            <div id="session-list" class="session-list"></div>
        </aside>

        <main class="panel">
            <header class="header-row">
                <div>
                    <div id="chat-title" class="session-title">新对话</div>
                    <div id="chat-subtitle" class="meta-text">登录后历史会话会保存在 SQLite 中。</div>
                </div>
                <div class="auth-actions">
                    <button id="admin-btn" class="secondary-btn hidden" type="button">用户管理</button>
                    <button id="show-auth-btn" class="secondary-btn hidden" type="button">登录 / 注册</button>
                    <button id="logout-btn" class="secondary-btn hidden" type="button">退出登录</button>
                </div>
            </header>

            <section id="messages" class="messages"></section>

            <form id="chat-form">
                <textarea id="message-input" placeholder="输入你的问题，按 Ctrl+Enter 发送"></textarea>
                <div class="composer-row">
                    <span id="status-text" class="status-text">正在检查登录状态...</span>
                    <button id="send-btn" class="primary-btn" type="submit">发送</button>
                </div>
            </form>
        </main>
    </div>

    <div id="auth-overlay" class="auth-overlay hidden">
        <div class="auth-card">
            <div class="header-row">
                <div>
                    <div class="session-title">账号中心</div>
                    <div class="helper">默认会自动创建两个 SuperAdmin 账号：admin / admin123456、root / admin123456。</div>
                </div>
                <button id="close-auth-btn" class="ghost-btn" type="button">关闭</button>
            </div>

            <div class="tab-row">
                <button class="tab-btn active" type="button" data-tab="login">登录</button>
                <button class="tab-btn" type="button" data-tab="register">注册</button>
                <button class="tab-btn" type="button" data-tab="reset">找回密码</button>
            </div>

            <form id="login-form" class="form-grid auth-form">
                <input name="username" placeholder="用户名或邮箱" required>
                <input name="password" type="password" placeholder="密码" required>
                <button class="primary-btn" type="submit">登录</button>
            </form>

            <form id="register-form" class="form-grid auth-form hidden">
                <input name="username" placeholder="用户名" required>
                <input name="email" type="email" placeholder="邮箱" required>
                <div class="inline-grid">
                    <input name="verifyCode" placeholder="验证码" required>
                    <button id="send-register-code-btn" class="secondary-btn" type="button">发验证码</button>
                </div>
                <input name="password" type="password" placeholder="密码（至少 6 位）" required>
                <input name="confirmPassword" type="password" placeholder="确认密码" required>
                <button class="primary-btn" type="submit">注册</button>
            </form>

            <form id="reset-form" class="form-grid auth-form hidden">
                <input name="email" type="email" placeholder="注册邮箱" required>
                <div class="inline-grid">
                    <input name="verifyCode" placeholder="验证码" required>
                    <button id="send-reset-code-btn" class="secondary-btn" type="button">发验证码</button>
                </div>
                <input name="password" type="password" placeholder="新密码" required>
                <input name="confirmPassword" type="password" placeholder="确认新密码" required>
                <button class="primary-btn" type="submit">重置密码</button>
            </form>

            <div id="auth-status" class="helper"></div>
        </div>
    </div>

    <div id="admin-overlay" class="admin-overlay hidden">
        <div class="admin-card">
            <div class="header-row">
                <div>
                    <div class="session-title">用户管理</div>
                    <div class="helper">只有 SuperAdmin 可以查看全部用户并启用或禁用账号。</div>
                </div>
                <div class="auth-actions">
                    <button id="refresh-admin-btn" class="secondary-btn" type="button">刷新</button>
                    <button id="close-admin-btn" class="ghost-btn" type="button">关闭</button>
                </div>
            </div>
            <div id="admin-status" class="helper"></div>
            <div id="admin-user-list" class="admin-list"></div>
        </div>
    </div>

    <script>
        const state = {
            auth: null,
            sessionId: null,
            sessions: [],
            messages: [],
            sending: false,
            currentAssistantMessageId: null,
            importingKeys: false,
            keyCount: 0,
        };

        const sessionListEl = document.getElementById("session-list");
        const messagesEl = document.getElementById("messages");
        const chatTitleEl = document.getElementById("chat-title");
        const chatSubtitleEl = document.getElementById("chat-subtitle");
        const modelSelectEl = document.getElementById("model-select");
        const messageInputEl = document.getElementById("message-input");
        const statusTextEl = document.getElementById("status-text");
        const sendBtnEl = document.getElementById("send-btn");
        const renameSessionBtnEl = document.getElementById("rename-session-btn");
        const deleteSessionBtnEl = document.getElementById("delete-session-btn");
        const importKeysBtnEl = document.getElementById("import-keys-btn");
        const keyMetaEl = document.getElementById("key-meta");
        const keyToolsEl = document.getElementById("key-tools");
        const authOverlayEl = document.getElementById("auth-overlay");
        const adminOverlayEl = document.getElementById("admin-overlay");
        const authUserEl = document.getElementById("auth-user");
        const authMetaEl = document.getElementById("auth-meta");
        const showAuthBtnEl = document.getElementById("show-auth-btn");
        const logoutBtnEl = document.getElementById("logout-btn");
        const adminBtnEl = document.getElementById("admin-btn");
        const authStatusEl = document.getElementById("auth-status");
        const adminStatusEl = document.getElementById("admin-status");
        const adminUserListEl = document.getElementById("admin-user-list");

        function uid() {
            return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        }

        function setStatus(text) {
            statusTextEl.textContent = text;
        }

        function renderKeyMeta(sourceUrl = null) {
            if (!keyMetaEl || !importKeysBtnEl) {
                return;
            }
            const sourceText = sourceUrl || "https://github.com/weicengxing/freeclaude/blob/main/key.txt";
            keyMetaEl.innerHTML = `Key 数量：${state.keyCount}<br>来源：${escapeHtml(sourceText)}`;
            importKeysBtnEl.disabled = !state.auth?.is_admin || state.sending || state.importingKeys;
        }

        function setAuthStatus(text, isError = false) {
            authStatusEl.textContent = text || "";
            authStatusEl.style.color = isError ? "#dc2626" : "#667085";
        }

        function setAdminStatus(text, isError = false) {
            adminStatusEl.textContent = text || "";
            adminStatusEl.style.color = isError ? "#dc2626" : "#667085";
        }

        function escapeHtml(text) {
            return String(text || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;");
        }

        function applyAuth(auth) {
            state.auth = auth;
            const loggedIn = Boolean(auth?.authenticated);
            authUserEl.textContent = loggedIn ? auth.user.username : "未登录";
            authMetaEl.textContent = loggedIn
                ? `${auth.user.email} · ${auth.user.role}`
                : "请先登录后再开始聊天。";
            logoutBtnEl.classList.toggle("hidden", !loggedIn);
            showAuthBtnEl.classList.toggle("hidden", loggedIn);
            adminBtnEl.classList.toggle("hidden", !auth?.is_admin);
            keyToolsEl.classList.toggle("hidden", !auth?.is_admin);
            messageInputEl.disabled = !loggedIn || state.sending;
            sendBtnEl.disabled = !loggedIn || state.sending;
            modelSelectEl.disabled = !loggedIn || state.sending;
            renameSessionBtnEl.disabled = !loggedIn || !state.sessionId || state.sending;
            deleteSessionBtnEl.disabled = !loggedIn || !state.sessionId || state.sending;
            renderKeyMeta();

            if (!loggedIn) {
                state.sessionId = null;
                state.sessions = [];
                state.messages = [];
                state.keyCount = 0;
                renderSessions();
                renderMessages();
                chatTitleEl.textContent = "新对话";
                chatSubtitleEl.textContent = "登录后历史会话会保存在 SQLite 中。";
                setStatus("请先登录");
                authOverlayEl.classList.remove("hidden");
                adminOverlayEl.classList.add("hidden");
            }
        }

        function setSending(isSending) {
            state.sending = isSending;
            applyAuth(state.auth);
            setStatus(isSending ? "正在思考..." : (state.auth?.authenticated ? "准备就绪" : "请先登录"));
        }

        function scrollMessagesToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function renderSessions() {
            if (!state.sessions.length) {
                sessionListEl.innerHTML = `<div class="helper">${state.auth?.authenticated ? "还没有历史会话，先开始一轮对话吧。" : "登录后会在这里看到你的会话。"}</div>`;
                return;
            }

            sessionListEl.innerHTML = state.sessions.map((session) => `
                <div class="session-row">
                    <button class="session-card ${session.id === state.sessionId ? "active" : ""}" type="button" data-session-id="${session.id}">
                        <div class="session-title">${escapeHtml(session.title)}</div>
                        <div class="meta-text">${escapeHtml(session.model)}</div>
                    </button>
                    <button class="danger-btn" type="button" data-delete-session="${session.id}">删</button>
                </div>
            `).join("");

            sessionListEl.querySelectorAll("[data-session-id]").forEach((button) => {
                button.addEventListener("click", async () => loadSession(button.dataset.sessionId, true));
            });
            sessionListEl.querySelectorAll("[data-delete-session]").forEach((button) => {
                button.addEventListener("click", async () => deleteSession(button.dataset.deleteSession));
            });
        }

        function renderMessages() {
            if (!state.messages.length) {
                messagesEl.innerHTML = `<div class="helper">${state.auth?.authenticated ? "这里还没有消息，开始第一轮提问吧。" : "登录后即可查看和发送消息。"}</div>`;
                return;
            }

            messagesEl.innerHTML = state.messages.map((message) => `
                <div class="message ${message.role}">
                    <div class="message-top">
                        <div class="message-role">${message.role === "user" ? "用户" : "AI"}</div>
                        <div class="message-actions">
                            ${message.role === "user" ? `<button class="message-btn" type="button" data-edit-message="${message.id}">编辑后重发</button>` : ""}
                            <button class="message-btn danger" type="button" data-delete-message="${message.id}">从此删除</button>
                        </div>
                    </div>
                    <div>${escapeHtml(message.content || "").replaceAll("\n", "<br>")}</div>
                </div>
            `).join("");

            messagesEl.querySelectorAll("[data-delete-message]").forEach((button) => {
                button.addEventListener("click", async () => deleteMessageFrom(Number(button.dataset.deleteMessage)));
            });
            messagesEl.querySelectorAll("[data-edit-message]").forEach((button) => {
                button.addEventListener("click", async () => {
                    const target = state.messages.find((item) => item.id === Number(button.dataset.editMessage));
                    if (target) {
                        await editAndResendMessage(target);
                    }
                });
            });
            scrollMessagesToBottom();
        }

        function appendLocalMessage(role, content = "") {
            const nextMessage = { id: uid(), role, content };
            state.messages = [...state.messages, nextMessage];
            renderMessages();
            return nextMessage.id;
        }

        function updateLocalMessage(messageId, content) {
            state.messages = state.messages.map((message) =>
                message.id === messageId ? { ...message, content } : message
            );
            renderMessages();
        }

        async function fetchJson(url, options = {}) {
            const response = await fetch(url, options);
            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error(data.detail || data.error || "请求失败");
            }
            return data;
        }

        async function refreshAuth() {
            try {
                const auth = await fetchJson("/api/auth/me");
                applyAuth(auth);
                if (auth.authenticated) {
                    authOverlayEl.classList.add("hidden");
                }
                return auth;
            } catch (error) {
                applyAuth(null);
                setStatus(error.message || "认证失败");
                return null;
            }
        }

        async function refreshSessions() {
            if (!state.auth?.authenticated) {
                return;
            }
            state.sessions = await fetchJson("/api/sessions");
            renderSessions();
        }

        async function refreshKeyStatus() {
            if (!state.auth?.is_admin) {
                state.keyCount = 0;
                renderKeyMeta();
                return;
            }
            const data = await fetchJson("/api/keys");
            state.keyCount = data.total_keys || 0;
            renderKeyMeta(data.source_url);
        }

        async function importKeysFromGithub() {
            if (!state.auth?.is_admin) {
                return;
            }
            state.importingKeys = true;
            renderKeyMeta();
            setStatus("正在从 GitHub 导入 Key...");
            try {
                const data = await fetchJson("/api/keys/import", {
                    method: "POST",
                });
                state.keyCount = data.total_keys || state.keyCount;
                renderKeyMeta(data.source_url);
                setStatus(`导入完成：新增 ${data.inserted_count} 个，跳过 ${data.ignored_count} 个`);
            } catch (error) {
                setStatus(error.message || "导入 Key 失败");
            } finally {
                state.importingKeys = false;
                renderKeyMeta();
            }
        }

        function renderAdminUsers(users) {
            if (!users.length) {
                adminUserListEl.innerHTML = `<div class="helper">暂无用户数据</div>`;
                return;
            }

            adminUserListEl.innerHTML = users.map((user) => `
                <div class="admin-user-card">
                    <div>
                        <div class="session-title">${escapeHtml(user.username)} ${user.role === "SuperAdmin" ? "(SuperAdmin)" : ""}</div>
                        <div class="admin-user-meta">
                            ID: ${user.id}<br>
                            邮箱: ${escapeHtml(user.email)}<br>
                            状态: ${user.is_active ? "启用" : "禁用"}<br>
                            创建时间: ${escapeHtml(user.created_at || "")}
                        </div>
                    </div>
                    <button
                        class="${user.is_active ? "danger-btn" : "primary-btn"}"
                        type="button"
                        data-toggle-user="${user.id}"
                        data-next-active="${user.is_active ? "0" : "1"}"
                    >${user.is_active ? "禁用" : "启用"}</button>
                </div>
            `).join("");

            adminUserListEl.querySelectorAll("[data-toggle-user]").forEach((button) => {
                button.addEventListener("click", async () => {
                    const userId = button.dataset.toggleUser;
                    const nextActive = button.dataset.nextActive === "1";
                    await updateUserStatus(userId, nextActive);
                });
            });
        }

        async function refreshAdminUsers() {
            if (!state.auth?.is_admin) {
                return;
            }
            setAdminStatus("正在加载用户列表...");
            try {
                const data = await fetchJson("/api/admin/users");
                renderAdminUsers(data.users || []);
                setAdminStatus("用户列表已更新");
            } catch (error) {
                setAdminStatus(error.message || "加载用户失败", true);
            }
        }

        async function updateUserStatus(userId, isActive) {
            const actionText = isActive ? "启用" : "禁用";
            if (!window.confirm(`确定要${actionText}这个用户吗？`)) {
                return;
            }
            try {
                await fetchJson(`/api/admin/users/${userId}`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ is_active: isActive }),
                });
                await refreshAdminUsers();
            } catch (error) {
                setAdminStatus(error.message || `${actionText}失败`, true);
            }
        }

        async function createSession() {
            if (!state.auth?.authenticated) {
                authOverlayEl.classList.remove("hidden");
                return;
            }
            const session = await fetchJson("/api/sessions", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ model: modelSelectEl.value }),
            });
            state.messages = [];
            state.sessionId = session.id;
            chatTitleEl.textContent = session.title;
            chatSubtitleEl.textContent = session.id;
            renderMessages();
            await refreshSessions();
        }

        async function loadSession(sessionId, syncModel = false) {
            const data = await fetchJson(`/api/sessions/${sessionId}`);
            state.sessionId = data.session.id;
            state.messages = data.messages || [];
            chatTitleEl.textContent = data.session.title;
            chatSubtitleEl.textContent = data.session.id;
            if (syncModel) {
                modelSelectEl.value = data.session.model;
            }
            applyAuth(state.auth);
            renderMessages();
            renderSessions();
        }

        async function renameSession(sessionId = state.sessionId) {
            if (!sessionId) return;
            const target = state.sessions.find((item) => item.id === sessionId);
            if (!target) return;
            const title = window.prompt("输入新的会话标题", target.title);
            if (title === null) return;
            const trimmed = title.trim();
            if (!trimmed) {
                setStatus("标题不能为空");
                return;
            }
            const data = await fetchJson(`/api/sessions/${sessionId}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ title: trimmed }),
            });
            chatTitleEl.textContent = data.session.title;
            await refreshSessions();
            setStatus("会话标题已更新");
        }

        async function deleteSession(sessionId = state.sessionId) {
            if (!sessionId) return;
            const target = state.sessions.find((item) => item.id === sessionId);
            if (!target) return;
            if (!window.confirm(`确定删除会话「${target.title}」吗？`)) return;
            await fetchJson(`/api/sessions/${sessionId}`, { method: "DELETE" });
            if (state.sessionId === sessionId) {
                state.sessionId = null;
                state.messages = [];
                renderMessages();
                chatTitleEl.textContent = "新对话";
                chatSubtitleEl.textContent = "当前没有打开的会话";
            }
            await refreshSessions();
            if (!state.sessionId && state.sessions.length) {
                await loadSession(state.sessions[0].id, true);
            }
            setStatus("会话已删除");
        }

        async function deleteMessageFrom(messageId) {
            if (!state.sessionId) return;
            if (!window.confirm("确定从这条消息开始删除吗？这条及后续消息都会被删除。")) return;
            setSending(true);
            try {
                const data = await fetchJson(`/api/sessions/${state.sessionId}/messages/${messageId}`, {
                    method: "DELETE",
                });
                state.messages = data.messages || [];
                chatTitleEl.textContent = data.session.title;
                renderMessages();
                await refreshSessions();
                setStatus("消息已删除");
            } catch (error) {
                setStatus(error.message || "删除失败");
            } finally {
                setSending(false);
            }
        }

        async function editAndResendMessage(message) {
            const edited = window.prompt("修改后会从这里重新生成后续对话。", message.content);
            if (edited === null) return;
            const trimmed = edited.trim();
            if (!trimmed) {
                setStatus("消息不能为空");
                return;
            }
            setSending(true);
            try {
                const data = await fetchJson(`/api/sessions/${state.sessionId}/messages/${message.id}/resend`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: trimmed,
                        model: modelSelectEl.value,
                    }),
                });
                state.messages = data.messages || [];
                chatTitleEl.textContent = data.session.title;
                renderMessages();
                await refreshSessions();
                setStatus("已重新生成后续对话");
            } catch (error) {
                setStatus(error.message || "重发失败");
            } finally {
                setSending(false);
            }
        }

        async function sendMessage() {
            const message = messageInputEl.value.trim();
            if (!message || state.sending) return;
            if (!state.sessionId) {
                await createSession();
            }
            if (!state.sessionId) return;

            const pendingMessage = message;
            messageInputEl.value = "";
            appendLocalMessage("user", pendingMessage);
            state.currentAssistantMessageId = appendLocalMessage("assistant", "");
            setSending(true);

            try {
                const response = await fetch("/api/chat/stream", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        session_id: state.sessionId,
                        message: pendingMessage,
                        model: modelSelectEl.value,
                    }),
                });

                if (!response.ok) {
                    const data = await response.json().catch(() => ({}));
                    throw new Error(data.detail || "发送失败");
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";
                let assistantText = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const chunks = buffer.split("\n\n");
                    buffer = chunks.pop() || "";

                    for (const chunk of chunks) {
                        const lines = chunk.split("\n");
                        let eventName = "message";
                        let dataText = "";

                        for (const line of lines) {
                            if (line.startsWith("event:")) eventName = line.slice(6).trim();
                            if (line.startsWith("data:")) dataText += line.slice(5).trim();
                        }

                        if (!dataText) continue;
                        const payload = JSON.parse(dataText);

                        if (eventName === "start" && payload.session) {
                            state.sessionId = payload.session.id;
                            chatTitleEl.textContent = payload.session.title;
                            chatSubtitleEl.textContent = payload.session.id;
                        }
                        if (eventName === "delta") {
                            assistantText += payload.text || "";
                            updateLocalMessage(state.currentAssistantMessageId, assistantText);
                        }
                        if (eventName === "done") {
                            assistantText = payload.reply || assistantText;
                            updateLocalMessage(state.currentAssistantMessageId, assistantText);
                            if (payload.session) {
                                chatTitleEl.textContent = payload.session.title;
                                chatSubtitleEl.textContent = payload.session.id;
                            }
                            await refreshSessions();
                        }
                        if (eventName === "error") {
                            throw new Error(payload.detail || "发送失败");
                        }
                    }
                }
            } catch (error) {
                state.messages = state.messages.slice(0, -2);
                renderMessages();
                setStatus(error.message || "发送失败");
            } finally {
                state.currentAssistantMessageId = null;
                setSending(false);
                messageInputEl.focus();
            }
        }

        function switchAuthTab(tab) {
            document.querySelectorAll(".tab-btn").forEach((button) => {
                button.classList.toggle("active", button.dataset.tab === tab);
            });
            document.querySelectorAll(".auth-form").forEach((form) => {
                form.classList.toggle("hidden", form.id !== `${tab}-form`);
            });
            setAuthStatus("");
        }

        async function submitJsonForm(url, payload, successMessage) {
            const data = await fetchJson(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
            });
            setAuthStatus(successMessage || data.message || "操作成功");
            return data;
        }

        document.querySelectorAll(".tab-btn").forEach((button) => {
            button.addEventListener("click", () => switchAuthTab(button.dataset.tab));
        });

        showAuthBtnEl.addEventListener("click", () => {
            authOverlayEl.classList.remove("hidden");
        });

        adminBtnEl.addEventListener("click", async () => {
            adminOverlayEl.classList.remove("hidden");
            await refreshAdminUsers();
        });

        document.getElementById("close-auth-btn").addEventListener("click", () => {
            if (!state.auth?.authenticated) return;
            authOverlayEl.classList.add("hidden");
        });

        document.getElementById("close-admin-btn").addEventListener("click", () => {
            adminOverlayEl.classList.add("hidden");
        });

        document.getElementById("refresh-admin-btn").addEventListener("click", async () => {
            await refreshAdminUsers();
        });

        document.getElementById("new-chat-btn").addEventListener("click", async () => {
            try {
                await createSession();
                messageInputEl.focus();
            } catch (error) {
                setStatus(error.message || "创建会话失败");
            }
        });

        logoutBtnEl.addEventListener("click", async () => {
            try {
                await submitJsonForm("/api/auth/logout", {}, "已退出登录");
                await refreshAuth();
            } catch (error) {
                setStatus(error.message || "退出失败");
            }
        });

        renameSessionBtnEl.addEventListener("click", async () => {
            try {
                await renameSession();
            } catch (error) {
                setStatus(error.message || "重命名失败");
            }
        });

        deleteSessionBtnEl.addEventListener("click", async () => {
            try {
                await deleteSession();
            } catch (error) {
                setStatus(error.message || "删除失败");
            }
        });

        importKeysBtnEl.addEventListener("click", async () => {
            await importKeysFromGithub();
        });

        document.getElementById("chat-form").addEventListener("submit", async (event) => {
            event.preventDefault();
            await sendMessage();
        });

        messageInputEl.addEventListener("keydown", async (event) => {
            if (event.key === "Enter" && event.ctrlKey) {
                event.preventDefault();
                await sendMessage();
            }
        });

        document.getElementById("send-register-code-btn").addEventListener("click", async () => {
            const form = document.getElementById("register-form");
            const email = form.email.value.trim();
            if (!email) {
                setAuthStatus("请先填写邮箱", true);
                return;
            }
            try {
                await submitJsonForm("/api/auth/register-verify", { email }, "注册验证码已发送");
            } catch (error) {
                setAuthStatus(error.message || "发送失败", true);
            }
        });

        document.getElementById("send-reset-code-btn").addEventListener("click", async () => {
            const form = document.getElementById("reset-form");
            const email = form.email.value.trim();
            if (!email) {
                setAuthStatus("请先填写邮箱", true);
                return;
            }
            try {
                await submitJsonForm("/api/auth/verify", { email }, "重置验证码已发送");
            } catch (error) {
                setAuthStatus(error.message || "发送失败", true);
            }
        });

        document.getElementById("login-form").addEventListener("submit", async (event) => {
            event.preventDefault();
            const form = event.currentTarget;
            try {
                await submitJsonForm("/api/auth/login", {
                    username: form.username.value.trim(),
                    password: form.password.value,
                }, "登录成功");
                form.reset();
                await refreshAuth();
                await refreshSessions();
                if (state.sessions.length) {
                    await loadSession(state.sessions[0].id, true);
                }
            } catch (error) {
                setAuthStatus(error.message || "登录失败", true);
            }
        });

        document.getElementById("register-form").addEventListener("submit", async (event) => {
            event.preventDefault();
            const form = event.currentTarget;
            try {
                await submitJsonForm("/api/auth/register", {
                    username: form.username.value.trim(),
                    email: form.email.value.trim(),
                    verifyCode: form.verifyCode.value.trim(),
                    password: form.password.value,
                    confirmPassword: form.confirmPassword.value,
                }, "注册成功，请直接登录");
                form.reset();
                switchAuthTab("login");
            } catch (error) {
                setAuthStatus(error.message || "注册失败", true);
            }
        });

        document.getElementById("reset-form").addEventListener("submit", async (event) => {
            event.preventDefault();
            const form = event.currentTarget;
            try {
                await submitJsonForm("/api/auth/reset", {
                    email: form.email.value.trim(),
                    verifyCode: form.verifyCode.value.trim(),
                    password: form.password.value,
                    confirmPassword: form.confirmPassword.value,
                }, "密码已重置，请重新登录");
                form.reset();
                switchAuthTab("login");
            } catch (error) {
                setAuthStatus(error.message || "重置失败", true);
            }
        });

        async function init() {
            renderKeyMeta();
            renderSessions();
            renderMessages();
            const auth = await refreshAuth();
            if (auth?.authenticated) {
                if (auth.is_admin) {
                    await refreshKeyStatus();
                }
                await refreshSessions();
                if (state.sessions.length) {
                    await loadSession(state.sessions[0].id, true);
                } else {
                    setStatus("准备就绪");
                }
            }
        }

        init();
    </script>
</body>
</html>
